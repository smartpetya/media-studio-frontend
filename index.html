<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Media Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08090d; --surface: #0e1117; --surface2: #141820;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --accent: #e8ff47; --accent2: #47c2ff; --accent3: #ff6b6b;
  --text: #f0f2f5; --text2: #8892a4; --text3: #4a5568; --green: #3ddc84;
  --mono: 'JetBrains Mono', monospace; --sans: 'Manrope', sans-serif; --display: 'Syne', sans-serif;
}
html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.5; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.app { min-height:100vh; background: var(--bg); background-image: radial-gradient(ellipse 100% 60% at 50% -10%, rgba(232,255,71,0.04) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 90% 50%, rgba(71,194,255,0.03) 0%, transparent 60%); }

/* Header */
.header { height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; border-bottom:1px solid var(--border); background:rgba(8,9,13,0.9); backdrop-filter:blur(20px); position:sticky; top:0; z-index:200; }
.logo { font-family:var(--display); font-size:15px; font-weight:800; letter-spacing:-0.03em; display:flex; align-items:center; gap:8px; cursor:pointer; }
.logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); }
.step-nav { display:flex; gap:4px; }
.step-btn { font-family:var(--mono); font-size:11px; font-weight:500; padding:6px 14px; border-radius:6px; border:1px solid transparent; cursor:pointer; transition:all 0.2s; background:none; color:var(--text3); }
.step-btn.active { background:rgba(232,255,71,0.08); border-color:rgba(232,255,71,0.25); color:var(--accent); }
.step-btn.done { color:var(--text2); border-color:var(--border); }
.step-btn:disabled { opacity:0.3; cursor:not-allowed; }
.header-right { display:flex; gap:8px; align-items:center; }

/* Main */
.main { max-width:960px; margin:0 auto; padding:40px 24px 80px; }
.section-tag { font-family:var(--mono); font-size:11px; color:var(--accent); letter-spacing:0.1em; margin-bottom:8px; }
.section-title { font-family:var(--display); font-size:28px; font-weight:800; letter-spacing:-0.03em; }
.section-sub { font-size:14px; color:var(--text2); margin-top:8px; line-height:1.6; }
.section-head { margin-bottom:32px; }

/* Cards & inputs */
.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:16px; }
.card-label { font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:0.1em; color:var(--text3); text-transform:uppercase; margin-bottom:10px; }
.input, .textarea, .select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--sans); font-size:14px; padding:12px 16px; outline:none; transition:border-color 0.2s; resize:vertical; }
.input:focus, .textarea:focus { border-color:var(--border2); }
.input::placeholder, .textarea::placeholder { color:var(--text3); }
select.select option { background:var(--surface2); }
.tip { font-size:12px; color:var(--text3); line-height:1.6; padding:10px 14px; background:rgba(255,255,255,0.03); border-left:2px solid var(--accent); border-radius:0 8px 8px 0; margin-top:8px; }

/* Buttons */
.btn-primary { background:var(--accent); color:#08090d; border:none; border-radius:10px; padding:12px 24px; font-family:var(--display); font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
.btn-primary:hover { background:#f5ff80; transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--text2); border-radius:8px; padding:8px 14px; font-family:var(--sans); font-size:12px; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost:hover { border-color:var(--border2); color:var(--text); }
.btn-accent2 { background:rgba(71,194,255,0.1); border:1px solid rgba(71,194,255,0.25); color:var(--accent2); border-radius:8px; padding:8px 14px; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; }
.btn-accent2:hover { background:rgba(71,194,255,0.18); }
.btn-accent2:disabled { opacity:0.4; cursor:not-allowed; }
.btn-danger { background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.2); color:var(--accent3); border-radius:8px; padding:8px 14px; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.btn-back { background:none; border:1px solid var(--border); color:var(--text3); border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; font-family:var(--sans); }
.btn-back:hover { border-color:var(--border2); color:var(--text2); }

/* Layout */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.settings-bar { background:rgba(14,17,23,0.95); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:28px; display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; }
.settings-field { display:flex; flex-direction:column; gap:6px; flex:1; min-width:140px; }

/* Act & Scene */
.act-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:12px; }
.act-header { display:flex; align-items:center; gap:12px; padding:16px 20px; cursor:pointer; user-select:none; }
.act-num { font-family:var(--mono); font-size:11px; color:var(--accent); background:rgba(232,255,71,0.08); border:1px solid rgba(232,255,71,0.2); border-radius:6px; padding:4px 8px; }
.act-title { font-family:var(--display); font-size:15px; font-weight:700; flex:1; }
.act-desc { font-size:12px; color:var(--text2); margin-top:2px; }
.scene-row { border-top:1px solid var(--border); padding:20px; display:grid; gap:16px; }
.scene-number { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:0.08em; }

/* Prompt blocks */
.prompt-block { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:16px; }
.prompt-block-label { font-family:var(--mono); font-size:10px; letter-spacing:0.08em; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.dot-char { width:6px; height:6px; border-radius:50%; display:inline-block; }

/* Badges */
.badge { font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:20px; }
.badge-wait { background:rgba(255,255,255,0.05); color:var(--text3); }
.badge-running { background:rgba(232,255,71,0.1); color:var(--accent); }
.badge-done { background:rgba(61,220,132,0.1); color:var(--green); }
.badge-error { background:rgba(255,107,107,0.1); color:var(--accent3); }
.badge-video { background:rgba(71,194,255,0.1); color:var(--accent2); }

/* Gen step */
.gen-scene { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:12px; display:flex; gap:20px; align-items:flex-start; }
.gen-preview { width:80px; height:80px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--text3); }
.gen-preview img { width:100%; height:100%; object-fit:cover; }
.progress-bar { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }

/* Export */
.export-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:24px; }
.export-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; text-align:center; }
.export-card-icon { font-size:32px; margin-bottom:10px; }
.export-card-title { font-family:var(--display); font-size:15px; font-weight:700; margin-bottom:4px; }
.export-card-sub { font-size:12px; color:var(--text2); }

/* Log */
.log-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-top:24px; max-height:200px; overflow-y:auto; }
.log-line { font-family:var(--mono); font-size:11px; color:var(--text3); line-height:1.9; }
.log-line.accent { color:var(--accent); } .log-line.green { color:var(--green); } .log-line.red { color:var(--accent3); }

/* Status bar */
.status-bar { display:flex; gap:8px; align-items:center; padding:8px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:20px; font-size:12px; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.status-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); }
.status-dot.off { background:var(--accent3); }

/* Projects list */
.projects-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; margin-bottom:24px; }
.project-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; cursor:pointer; transition:all 0.2s; position:relative; }
.project-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.project-card-title { font-family:var(--display); font-size:16px; font-weight:700; margin-bottom:6px; }
.project-card-meta { font-size:12px; color:var(--text3); font-family:var(--mono); }
.project-card-topic { font-size:13px; color:var(--text2); margin-top:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.project-card-status { position:absolute; top:16px; right:16px; }
.project-delete { position:absolute; bottom:16px; right:16px; background:none; border:none; color:var(--text3); cursor:pointer; font-size:14px; opacity:0; transition:opacity 0.2s; padding:4px 8px; }
.project-card:hover .project-delete { opacity:1; }
.project-delete:hover { color:var(--accent3); }

/* Video controls */
.video-controls { display:flex; gap:8px; align-items:center; margin-top:8px; flex-wrap:wrap; }
.video-preview { width:120px; height:68px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); overflow:hidden; }
.video-preview video { width:100%; height:100%; object-fit:cover; }

/* Animations */
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.spin { animation:spin 1s linear infinite; display:inline-block; }
.fade-in { animation:fadeIn 0.4s ease; }
.pulse { animation:pulse 1.5s ease-in-out infinite; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; z-index:999; padding:20px; }
.modal-box { background:var(--surface); border:1px solid var(--border2); border-radius:20px; padding:32px; width:100%; max-width:480px; }

@media (max-width:640px) {
  .two-col, .grid2, .export-grid { grid-template-columns:1fr; }
  .settings-bar { flex-direction:column; }
  .step-btn { padding:6px 8px; font-size:10px; }
  .header { padding:0 12px; }
  .main { padding:24px 12px 60px; }
  .gen-scene { flex-direction:column; }
  .projects-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════════════════
const API_BASE = localStorage.getItem('media_studio_api') || 'https://media-studio-backend-production.up.railway.app';

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
const state = {
  step: 'home', // home | scenario | characters | scenes | generate | export
  apiStatus: { claude: false, gemini: false, elevenlabs: false },
  scenario: null,
  acts: [],
  style: 'cinematic',
  aspectRatio: '9:16',
  language: 'ru',
  log: [],
  // Project management
  projectId: null,
  projects: [],
  projectsLoading: false,
  // Video
  videoProvider: 'auto',
  videoProviders: [],
  finalVideoUrl: null,
  sceneDuration: 5,
  // Characters (Disney mode)
  characters: [], // { id, name, role, originalPhoto, stylizedPhoto, stylizedUrl, description, charSheet: [{viewId, url, image}], sheetGenerating: false }
  // Locations (per act)
  locations: {}, // { [actId]: { prompt, url, image, generating: false } }
};

const NEGATIVE_BASE = 'blurry, out of focus, low quality, jpeg artifacts, watermark, text overlay, signature, extra limbs, distorted face, bad anatomy, disfigured, duplicate, overexposed, underexposed, flat lighting, ugly, deformed';

const STYLE_TAGS = {
  cinematic: 'shot on ARRI Alexa, anamorphic 2.39:1, film grain, shallow depth of field, cinematic lighting',
  realistic: 'shot on Sony A7R5, 85mm f/1.4, photorealistic, 8K, ultra sharp, professional photography',
  disney_pixar: 'Disney Pixar 3D animation style, vibrant colors, soft lighting, expressive characters, magical atmosphere, Pixar quality rendering, subsurface scattering on skin',
  disney_classic: 'Classic Disney 2D animation style, hand-drawn look, warm colors, fairy tale atmosphere, watercolor backgrounds, golden era Disney',
  anime: 'anime key visual, studio quality illustration, vibrant colors, detailed linework',
  oil_painting: 'oil painting on canvas, impressionist technique, rich impasto, museum quality',
  watercolor: 'watercolor illustration, soft wet edges, paper texture, artistic',
  digital_art: 'digital concept art, ArtStation trending, cinematic composition, volumetric lighting',
};

const CAMERA_OPTS = [
  ['slow_zoom_in','Зум в'],['slow_zoom_out','Зум из'],['pan_left','Пан влево'],['pan_right','Пан вправо'],
  ['tilt_up','Подъём'],['tilt_down','Спуск'],['ken_burns','Ken Burns'],['parallax','Параллакс'],['static','Статика']
];

// ══════════════════════════════════════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════════════════════════════════════
async function api(path, body) {
  let res;
  try {
    res = await fetch(API_BASE + path, {
      method: body ? 'POST' : 'GET',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
  } catch (fetchErr) {
    throw new Error(`Сеть: ${fetchErr.message} (${path})`);
  }
  
  let text;
  try {
    text = await res.text();
  } catch (readErr) {
    throw new Error(`Чтение ответа: ${readErr.message} (${path}, status=${res.status})`);
  }
  
  if (!text || text.length === 0) {
    throw new Error(`Пустой ответ от сервера (${path}, status=${res.status})`);
  }
  
  let json;
  try {
    json = JSON.parse(text);
  } catch (parseErr) {
    console.error('API parse error:', path, 'status:', res.status, 'length:', text.length, 'body:', text.slice(0, 300));
    throw new Error(`Невалидный JSON (${path}, status=${res.status}, ${text.length}b): ${text.slice(0, 100)}`);
  }
  
  if (!json.success) throw new Error(json.error || 'API error');
  return json;
}

async function apiPatch(path, body) {
  const res = await fetch(API_BASE + path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'API error');
  return json;
}

async function apiDelete(path) {
  const res = await fetch(API_BASE + path, { method: 'DELETE' });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'API error');
  return json;
}

function addLog(msg, type = '') {
  const t = new Date().toLocaleTimeString();
  state.log.push({ msg, type, t });
  if (state.log.length > 80) state.log.shift();
  renderLog();
}

function genId() { return Math.random().toString(36).slice(2, 8); }

const delay = ms => new Promise(r => setTimeout(r, ms));

// Cost tracking
let sessionCosts = null;
async function fetchCosts() {
  try {
    const res = await api('/api/costs');
    sessionCosts = res.costs;
  } catch (_) {}
}

function makeScene(actId, idx) {
  return { id: genId(), actId, index: idx, duration: 5, voiceScript: '', hasCharacter: true,
    characterDesc: '', environmentDesc: '', cameraMove: 'slow_zoom_in',
    promptStart: '', promptEnd: '', negativePrompt: NEGATIVE_BASE,
    character: null, environment: null,
    imageStartUrl: null, imageEndUrl: null, audioUrl: null, videoUrl: null,
    videoTaskId: null, videoProvider: null, videoStatus: null, mergedUrl: null,
    status: 'idle', error: null };
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const h = (tag, cls, html, attrs = {}) => {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined && html !== null) el.innerHTML = html;
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'onclick' || k === 'onchange' || k === 'oninput') el[k] = v;
    else if (k === 'disabled' && v) el.disabled = true;
    else el.setAttribute(k, v);
  });
  return el;
};

function render() {
  const app = $('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());
  const main = h('div', 'main');
  if (state.step === 'home') main.appendChild(renderHome());
  else if (state.step === 'scenario') main.appendChild(renderScenario());
  else if (state.step === 'characters') main.appendChild(renderCharacters());
  else if (state.step === 'scenes') main.appendChild(renderScenes());
  else if (state.step === 'generate') main.appendChild(renderGenerate());
  else if (state.step === 'export') main.appendChild(renderExport());
  app.appendChild(main);
  // Post-render hooks
  if (state.step === 'scenario') setTimeout(initEstimator, 50);
}

function initEstimator() {
  const update = () => {
    const a = +$('inp-acts')?.value || 4;
    const s = +$('inp-scenes')?.value || 3;
    const d = +$('inp-dur')?.value || 5;
    const total = a * s;
    const dur = total * d;
    const min = Math.floor(dur / 60);
    const sec = dur % 60;
    const el = $('cost-estimate');
    if (el) el.innerHTML = `<div class="tip" style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;font-size:12px">
      <span>📊 <strong>${total} сцен</strong> · ${min ? min + ' мин ' : ''}${sec} сек</span>
      <span>🎨 Фото: ~$${(total * 0.039).toFixed(2)}</span>
      <span>🎬 $${(total*d*0.03).toFixed(2)} Kling / $${(total*d*0.07).toFixed(2)} Runway / $${(total*d*0.15).toFixed(2)} Veo</span>
    </div>`;
  };
  ['inp-acts','inp-scenes','inp-dur'].forEach(id => {
    const el = $(id);
    if (el) el.addEventListener('change', update);
  });
  update();
}

// ── HEADER ──
function renderHeader() {
  const header = h('header', 'header');
  const logoEl = h('div', 'logo', '<div class="logo-dot"></div>MEDIA STUDIO <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">v7</span>', {
    onclick: () => { state.step = 'home'; render(); }
  });
  header.appendChild(logoEl);

  if (state.step !== 'home') {
    const nav = h('nav', 'step-nav');
    const steps = [['scenario','01 Сценарий'],['characters','02 Персонажи'],['scenes','03 Сцены'],['generate','04 Генерация'],['export','05 Экспорт']];
    steps.forEach(([key, label]) => {
      const available = key === 'scenario' || (key === 'characters' && state.scenario) || (key === 'scenes' && state.scenario) || (key === 'generate' && state.acts.length) || (key === 'export' && state.acts.some(a => a.scenes.some(s => s.status === 'done')));
      const btn = h('button', `step-btn${state.step === key ? ' active' : available ? ' done' : ''}`, label, {
        onclick: () => { if (available) { state.step = key; render(); } },
        disabled: !available
      });
      nav.appendChild(btn);
    });
    header.appendChild(nav);
  }

  const rightDiv = h('div', 'header-right');
  if (sessionCosts) {
    const costEl = h('span', '', `💰 $${sessionCosts.total.toFixed(3)}`, {
      style: 'font-family:var(--mono);font-size:11px;color:var(--accent);cursor:pointer',
      onclick: showCostsModal
    });
    rightDiv.appendChild(costEl);
  }
  if (state.projectId) {
    const saveBtn = h('button', 'btn-ghost', '💾 Сохранить', { onclick: saveProject });
    rightDiv.appendChild(saveBtn);
  }
  const settingsBtn = h('button', 'btn-ghost', '⚙ backend', { onclick: showSettingsModal });
  rightDiv.appendChild(settingsBtn);
  header.appendChild(rightDiv);
  return header;
}

// ── SETTINGS MODAL ──
function showSettingsModal() {
  const overlay = h('div', 'modal-overlay', null, { onclick: (e) => { if (e.target === overlay) overlay.remove(); } });
  const box = h('div', 'modal-box');
  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div style="font-family:var(--display);font-size:18px;font-weight:800">Backend URL</div>

function renderHome() {

      const statusMap = { scenario:'📝 Сценарий', scenes:'🎭 Сцены', generating:'⚡ Генерация', done:'✅ Готово' };
      html += `<div class="project-card" onclick="loadProject('${p.id}')">
        <div class="project-card-status"><span class="badge badge-${p.status === 'done' ? 'done' : 'wait'}">${statusMap[p.status] || p.status}</span></div>

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

window.newProject = function() {
  state.projectId = null;
  state.scenario = null;
  state.acts = [];
  state.log = [];
  state.step = 'scenario';
  render();
};

window.loadProject = async function(id) {
  try {
    addLog('📂 Загружаю проект...', 'accent');
    const res = await api(`/api/projects/${id}`);
    state.projectId = id;
    const p = res.project;
    state.style = p.style || 'cinematic';
    state.aspectRatio = p.aspect_ratio || '9:16';
    state.language = p.language || 'ru';
    state.scenario = p.plan ? { topic: p.topic, competitors: p.competitors, vector: p.vector, plan: p.plan } : null;
    state.acts = res.acts || [];
    // Determine which step to show
    if (state.acts.length && state.acts.some(a => a.scenes?.some(s => s.status === 'done'))) {
      state.step = 'export';
    } else if (state.acts.length && state.acts.some(a => a.scenes?.some(s => s.promptStart))) {
      state.step = 'generate';
    } else if (state.acts.length) {
      state.step = 'scenes';
    } else if (state.scenario) {
      state.step = 'scenario';
    } else {
      state.step = 'scenario';
    }
    addLog('✅ Проект загружен', 'green');
    render();
  } catch (e) {
    addLog('❌ ' + e.message, 'red');
    alert('Ошибка загрузки: ' + e.message);
  }
};

window.deleteProject = async function(id) {
  if (!confirm('Удалить проект? Все данные будут потеряны.')) return;
  try {
    await apiDelete(`/api/projects/${id}`);
    state.projects = state.projects.filter(p => p.id !== id);
    if (state.projectId === id) { state.projectId = null; state.scenario = null; state.acts = []; }
    render();
  } catch (e) { alert('Ошибка: ' + e.message); }
};

async function loadProjects() {
  state.projectsLoading = true;
  render();
  try {
    const res = await api('/api/projects');
    state.projects = res.projects || [];
  } catch (e) {
    console.error('Load projects:', e.message);
    state.projects = [];
  }
  state.projectsLoading = false;
  render();
}

async function saveProject() {
  try {
    if (!state.projectId) {
      // Create new project
      const res = await api('/api/projects', {
        title: state.scenario?.plan?.title || 'Без названия',
        topic: state.scenario?.topic || '',
        competitors: state.scenario?.competitors || '',
        vector: state.scenario?.vector || '',
        style: state.style,
        aspect_ratio: state.aspectRatio,
        language: state.language,
        plan: state.scenario?.plan || null,
        status: state.step
      });
      state.projectId = res.project.id;
      addLog('💾 Проект создан', 'green');
    } else {
      // Update project
      await apiPatch(`/api/projects/${state.projectId}`, {
        title: state.scenario?.plan?.title || 'Без названия',
        style: state.style,
        aspect_ratio: state.aspectRatio,
        language: state.language,
        plan: state.scenario?.plan || null,
        status: state.step
      });
      addLog('💾 Проект обновлён', 'green');
    }
    // Save scenes
    if (state.acts.length && state.projectId) {
      await api(`/api/projects/${state.projectId}/save-scenes`, { acts: state.acts });
      addLog('💾 Сцены сохранены', 'green');
    }
  } catch (e) {
    addLog('❌ Сохранение: ' + e.message, 'red');
    alert('Ошибка сохранения: ' + e.message);
  }
}

async function loadVideoProviders() {
  try {
    const res = await api('/api/video-providers');
    state.videoProviders = res.providers || [];
  } catch (e) { console.log('Video providers:', e.message); }
}

window.genScenario = async function() {
  const btn = $('btn-gen-scenario');
  const topic = $('inp-topic')?.value;
  if (!topic?.trim()) return;
  btn.disabled = true; btn.innerHTML = '<span class="spin">◌</span> Думаю...';
  $('scenario-error').innerHTML = '';
  try {
    const actCount = +$('inp-acts')?.value || 4;
    const scenesPerAct = +$('inp-scenes')?.value || 3;
    const sceneDur = +$('inp-dur')?.value || 5;
    const res = await api('/api/scenario', {
      topic, competitors: $('inp-comp')?.value, vector: $('inp-vector')?.value,
      actCount, scenesPerAct, sceneDuration: sceneDur
    });
    state.sceneDuration = sceneDur;
    state.scenario = { topic, competitors: $('inp-comp')?.value, vector: $('inp-vector')?.value, plan: res.data };
    render();
  } catch (e) {
    $('scenario-error').innerHTML = `<div style="color:var(--accent3);font-size:13px;font-family:var(--mono);padding:12px">Ошибка: ${e.message}</div>`;
  } finally { btn.disabled = false; btn.innerHTML = 'Сгенерировать сценарий →'; }
};

window.goToScenes = function() {
  const plan = state.scenario.plan;
  const dur = state.sceneDuration || 5;
  state.acts = plan.acts.map(a => ({
    ...a, expanded: true,
    scenes: Array.from({ length: a.scenes_count }, (_, i) => ({ ...makeScene(a.id, i), duration: dur }))
  }));
  state.step = 'scenes';
  render();
};

window.goToCharacters = function() {
  state.step = 'characters';
  render();
};

      </div>

      ${state.characters.length && state.characters.some(c => c.stylizedPhoto && !c.charSheet?.length) ? `<button class="btn-primary" style="background:var(--accent2);color:#000" onclick="generateAllSheets()">🎭 Все Character Sheets</button>` : ''}
    </div>
    ${state.characters.length === 0 ? `
      <div class="card" style="text-align:center;padding:48px">
        <div style="font-size:48px;margin-bottom:16px">👨‍👩‍👧‍👦</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">Добавь персонажей</div>
        <div style="color:var(--text2);font-size:14px;margin-bottom:20px">Загрузи фото семьи или героев → AI превратит их в ${isDisney ? 'персонажей Disney' : 'стилизованных героев'}</div>

window.addCharacter = function() {
  state.characters.push({ id: genId(), name: '', role: '', originalPhoto: null, stylizedPhoto: null, stylizedUrl: null, description: '', stylizing: false, charSheet: [], sheetGenerating: false });
  render();
};

window.uploadCharPhoto = function(idx, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    state.characters[idx].originalPhoto = e.target.result;
    state.characters[idx].stylizedPhoto = null;
    render();
  };
  reader.readAsDataURL(file);
};

window.stylizeChar = async function(idx) {
  const ch = state.characters[idx];
  if (!ch.originalPhoto) return;
  ch.stylizing = true;
  render();
  addLog(`✨ Стилизация "${ch.name || 'Персонаж ' + (idx+1)}"...`, 'accent');
  try {
    const base64 = ch.originalPhoto.split(',')[1];
    const mime = ch.originalPhoto.split(';')[0].split(':')[1] || 'image/jpeg';
    const res = await api('/api/stylize-photo', {
      imageBase64: base64,
      imageMime: mime,
      style: state.style,
      styleTags: STYLE_TAGS[state.style],
      characterName: ch.name || 'character',
      characterDesc: ch.description || '',
      projectId: state.projectId || undefined
    });
    ch.stylizedPhoto = res.url || ('data:image/png;base64,' + res.image);
    ch.stylizedUrl = res.url || null;
    addLog(`✅ "${ch.name || 'Персонаж'}" стилизован!`, 'green');
  } catch (e) {
    addLog(`❌ Стилизация: ${e.message}`, 'red');
  }
  ch.stylizing = false;
  render();
};

window.stylizeAll = async function() {
  for (let i = 0; i < state.characters.length; i++) {
    if (state.characters[i].originalPhoto && !state.characters[i].stylizedPhoto) {
      await window.stylizeChar(i);
      if (i < state.characters.length - 1) await delay(3000);
    }
  }
};

// ── Character Sheet Generation ──
window.generateCharSheet = async function(idx) {
  const ch = state.characters[idx];
  if (!ch.stylizedPhoto && !ch.stylizedUrl) {
    addLog(`❌ Сначала стилизуйте "${ch.name || 'Персонаж'}"`, 'red');
    return;
  }
  ch.sheetGenerating = true;
  ch.charSheet = [];
  render();
  addLog(`🎭 Генерация Character Sheet для "${ch.name || 'Персонаж ' + (idx+1)}" (3 ракурса)...`, 'accent');
  try {
    let imgBase64, imgMime;
    if (ch.stylizedUrl) {
      // Server will download from URL
      imgBase64 = null;
    } else if (ch.stylizedPhoto?.startsWith('data:')) {
      imgBase64 = ch.stylizedPhoto.split(',')[1];
      imgMime = ch.stylizedPhoto.split(';')[0].split(':')[1] || 'image/png';
    }
    const res = await api('/api/character-sheet', {
      imageBase64: imgBase64 || undefined,
      imageUrl: ch.stylizedUrl || undefined,
      imageMime: imgMime || 'image/png',
      characterName: ch.name || 'Hero',
      characterDesc: ch.description || '',
      style: state.style,
      styleTags: STYLE_TAGS[state.style],
      projectId: state.projectId || undefined
    });
    ch.charSheet = (res.views || []).filter(v => !v.error);
    const ok = ch.charSheet.length;
    const fail = (res.views || []).filter(v => v.error).length;
    addLog(`✅ Character Sheet: ${ok} ракурсов готово${fail ? `, ${fail} с ошибкой` : ''}`, 'green');
  } catch (e) {
    addLog(`❌ Character Sheet: ${e.message}`, 'red');
  }
  ch.sheetGenerating = false;
  render();
};

window.generateAllSheets = async function() {
  for (let i = 0; i < state.characters.length; i++) {
    const ch = state.characters[i];
    if (ch.stylizedPhoto && !ch.charSheet?.length) {
      await window.generateCharSheet(i);
      if (i < state.characters.length - 1) await delay(3000);
    }
  }
};

// ── Location Generation ──
window.generateLocation = async function(actId) {
  if (!state.locations[actId]) state.locations[actId] = {};
  const loc = state.locations[actId];
  const act = state.acts.find(a => a.id === actId);
  if (!loc.prompt && act) loc.prompt = act.visual_direction || '';
  if (!loc.prompt) {
    addLog(`❌ Введите описание локации для Акта ${actId}`, 'red');
    return;
  }
  loc.generating = true;
  render();
  addLog(`🏞 Генерация локации для Акта ${actId}...`, 'accent');
  try {
    const res = await api('/api/generate-location', {
      prompt: loc.prompt,
      style: state.style,
      styleTags: STYLE_TAGS[state.style],
      aspectRatio: state.aspectRatio,
      projectId: state.projectId || undefined,
      actId: String(actId),
      locationName: act?.title || ''
    });
    loc.url = res.url || ('data:image/png;base64,' + res.image);
    loc.image = res.image;
    addLog(`✅ Локация для Акта ${actId} готова!`, 'green');
  } catch (e) {
    addLog(`❌ Локация: ${e.message}`, 'red');
  }
  loc.generating = false;
  render();
};

window.generateAllLocations = async function() {
  for (const act of state.acts) {
    if (!state.locations[act.id]) state.locations[act.id] = { prompt: act.visual_direction || '' };
    if (!state.locations[act.id].url) {
      await window.generateLocation(act.id);
      await delay(5000);
    }
  }
};

window.toggleAct = function(actId) { state.acts.find(a => a.id === actId).expanded ^= true; render(); };

window.updateScene = function(actId, sceneId, field, value) {
  const act = state.acts.find(a => a.id === actId);
  const scene = act?.scenes.find(s => s.id === sceneId);
  if (scene) scene[field] = value;
};

window.addScene = function(actId) {
  const act = state.acts.find(a => a.id === actId);
  act.scenes.push(makeScene(actId, act.scenes.length));
  render();
};

window.genOnePrompt = async function(actId, sceneId) {
  const act = state.acts.find(a => a.id === actId);
  const scene = act.scenes.find(s => s.id === sceneId);
  scene.status = 'generating_prompts'; render();
  addLog(`🧠 Акт ${actId}, сцена ${scene.index+1}: промпты...`, 'accent');
  try {
    const res = await api('/api/scene-prompts', {
      videoTitle: state.scenario.plan.title, act, scene,
      style: state.style, styleTags: STYLE_TAGS[state.style], aspectRatio: state.aspectRatio, language: state.language,
      characters: state.characters.filter(c => c.name || c.description).map(c => ({ name: c.name, role: c.role, description: c.description }))
    });
    Object.assign(scene, res.data, { negativePrompt: NEGATIVE_BASE + (res.data.negativePrompt ? ', ' + res.data.negativePrompt : ''), status: 'idle' });
    addLog(`✅ Акт ${actId}, сцена ${scene.index+1}: готово`, 'green');
  } catch (e) {
    scene.status = 'error'; scene.error = e.message;
    addLog(`❌ ${e.message}`, 'red');
  }
  render();
};

window.genAllPrompts = async function() {
  const btn = $('btn-all-prompts');
  btn.disabled = true; btn.innerHTML = '<span class="spin">◌</span> Генерирую...';
  
  const processedActs = []; // track previous acts for context
  
  for (const act of state.acts) {
    addLog(`🧠 Акт ${act.id} "${act.title}": промпты для ${act.scenes.length} сцен...`, 'accent');
    act.scenes.forEach(sc => { sc.status = 'generating_prompts'; });
    render();
    
    try {
      const res = await api('/api/act-prompts', {
        videoTitle: state.scenario.plan.title,
        logline: state.scenario.plan.logline || '',
        act,
        scenes: act.scenes,
        style: state.style,
        styleTags: STYLE_TAGS[state.style],
        aspectRatio: state.aspectRatio,
        language: state.language,
        characters: state.characters.filter(c => c.name || c.description).map(c => ({ name: c.name, role: c.role, description: c.description })),
        previousActs: processedActs
      });
      
      // Apply results to scenes
      const results = res.scenes || [];
      act.scenes.forEach((sc, i) => {
        if (results[i]) {
          Object.assign(sc, results[i], {
            negativePrompt: NEGATIVE_BASE + (results[i].negativePrompt ? ', ' + results[i].negativePrompt : ''),
            status: 'idle'
          });
        } else {
          sc.status = 'error';
          sc.error = 'Нет данных от AI для этой сцены';
        }
      });
      
      // Save this act's voiceScripts as context for next acts
      processedActs.push({
        id: act.id,
        title: act.title,
        scenes: act.scenes.map(sc => ({ voiceScript: sc.voiceScript }))
      });
      
      addLog(`✅ Акт ${act.id}: ${results.length} сцен готово`, 'green');
    } catch (e) {
      act.scenes.forEach(sc => { sc.status = 'error'; sc.error = e.message; });
      addLog(`❌ Акт ${act.id}: ${e.message}`, 'red');
      // Fallback: try one-by-one
      addLog(`↺ Акт ${act.id}: пробую по одной...`, 'accent');
      for (const sc of act.scenes) {
        if (sc.status === 'error') await window.genOnePrompt(act.id, sc.id);
      }
    }
    render();
  }
  
  btn.disabled = false; btn.innerHTML = '✦ Все промпты';
  render();
};

window.goToGenerate = function() { state.step = 'generate'; render(); };

  const sl = s => ({
    idle:'ожидание', generating_images:'🎨 кадры...', generating_audio:'🎙 озвучка...',

  // Video provider selector
  const vpOpts = state.videoProviders.length

  let html = `
    <div style="margin-bottom:16px"><button class="btn-back" onclick="state.step='scenes';render()">← Сцены</button></div>

    <div class="settings-bar">
      <div class="settings-field"><div class="card-label">Видео провайдер</div><select class="select" onchange="state.videoProvider=this.value">${vpOpts}</select></div>

        <button class="btn-primary" id="btn-run-gen" onclick="runGenerate()">▶ Фото + озвучка</button>
        <button class="btn-accent2" id="btn-batch-video" onclick="batchVideoGenerate()">🎬 Все видео</button>
        <button class="btn-ghost" id="btn-merge-all" onclick="mergeAllScenes()" ${withVideo < 2 ? 'disabled' : ''}>⚡ Склейка</button>
        <button class="btn-ghost" id="btn-stop-gen" onclick="stopGenerate()" style="display:none">⏹ Стоп</button>
      </div>
      ${doneCount ? `<span style="color:var(--green);font-size:13px;font-family:var(--mono);align-self:center">${doneCount}/${allScenes.length} сцен · ${withVideo} видео</span>` : ''}
    </div>`;

  state.acts.forEach(act => {
    html += `<div style="margin-bottom:24px"><div style="font-family:var(--display);font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px"><span class="act-num" style="font-size:10px">ACT ${act.id}</span> ${esc(act.title)}</div>`;
    act.scenes.forEach(sc => {
      const badgeCls = sc.status === 'done' ? 'done' : sc.status === 'error' ? 'error' : sc.status !== 'idle' ? 'running' : 'wait';
      html += `<div class="gen-scene">
        <div style="display:flex;gap:8px;flex-shrink:0">
          <div class="gen-preview">${sc.imageStartUrl ? `<img src="${sc.imageStartUrl}">` : '▷'}</div>
          <div class="gen-preview">${sc.imageEndUrl ? `<img src="${sc.imageEndUrl}">` : '▷'}</div>
        </div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            <span style="font-size:12px;font-family:var(--mono);color:var(--text3)">${act.id}.${sc.index+1}</span>
            <span class="badge badge-${badgeCls}">${sl(sc.status)}</span>
            <button class="btn-ghost" style="font-size:11px;padding:4px 10px" onclick="regenScene(${act.id},'${sc.id}')">↺ фото</button>
            ${sc.imageStartUrl ? `<button class="btn-accent2" style="font-size:11px;padding:4px 10px" onclick="genSceneVideo(${act.id},'${sc.id}')" ${sc.videoStatus==='processing'?'disabled':''}>🎬 видео</button>` : ''}
          </div>
          ${sc.voiceScript ? `<div style="font-size:13px;color:var(--text2);margin-bottom:8px">"${esc(sc.voiceScript.slice(0,100))}"</div>` : ''}
          <div class="progress-bar"><div class="progress-fill" style="width:${pw(sc.status)};background:${pc(sc.status)}"></div></div>
          ${sc.audioUrl ? `<audio controls src="${sc.audioUrl}" style="width:100%;height:32px;margin-top:8px"></audio>` : ''}
          ${sc.videoUrl ? `<div class="video-controls">
            <div class="video-preview" onclick="showVideoModal('${sc.videoUrl}')" style="cursor:pointer"><video src="${sc.videoUrl}" muted></video></div>
            <span class="badge badge-done">видео ✓</span>
            ${sc.audioUrl && sc.videoUrl ? `<button class="btn-ghost" style="font-size:11px;padding:4px 10px" onclick="mergeScene(${act.id},'${sc.id}')">⚡ +звук</button>` : ''}
            ${sc.mergedUrl ? `<span class="badge badge-done" style="background:rgba(71,194,255,0.1);color:var(--accent2)">склеено ✓</span>` : ''}
          </div>` : ''}
          ${sc.videoStatus === 'processing' ? `<div style="color:var(--accent2);font-size:11px;margin-top:6px;font-family:var(--mono)" class="pulse">🎬 Рендер видео... ${sc.videoProvider || ''}</div>` : ''}
          ${sc.error ? `<div style="color:var(--accent3);font-size:11px;margin-top:6px;font-family:var(--mono)">${esc(sc.error)}</div>` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  });

  html += `<div id="gen-log"></div>
    ${doneCount ? `<div style="margin-top:28px;display:flex;gap:12px"><button class="btn-primary" onclick="goToExport()">Экспорт → (${doneCount} сцен)</button><button class="btn-ghost" onclick="saveProject()">💾 Сохранить</button></div>` : ''}`;

  wrap.innerHTML = html;
  return wrap;
}

let genAbort = false;
window.stopGenerate = function() { genAbort = true; };

window.runGenerate = async function() {
  genAbort = false;
  const btn = $('btn-run-gen'); const stopBtn = $('btn-stop-gen');
  btn.disabled = true; btn.innerHTML = '<span class="spin">◌</span> Генерирую...';
  if (stopBtn) stopBtn.style.display = '';

  // Auto-save project to get projectId (needed for Supabase Storage URLs)
  if (!state.projectId) {
    addLog('💾 Автосохранение проекта...', 'accent');
    try { await saveProject(); } catch (e) { addLog('⚠️ Автосохранение: ' + e.message, 'red'); }
  }

  addLog('▶ Запуск генерации (фото + озвучка)...', 'accent');

  let isFirst = true;
  for (const act of state.acts) {
    for (const sc of act.scenes) {
      if (genAbort) break;
      if (!sc.promptStart) continue;
      if (sc.status === 'done' && sc.imageStartUrl) continue; // skip already done

      // [FIX #3] 5 sec delay between image generations (rate limit)
      if (!isFirst) {
        addLog('⏳ Пауза 5 сек (rate limit)...', '');
        await delay(5000);
      }
      isFirst = false;

      await processScene(act, sc);
      render();
    }
  }
  addLog('🎉 Генерация завершена!', 'green');
  if (stopBtn) stopBtn.style.display = 'none';
  btn.disabled = false; btn.innerHTML = '▶ Запустить (фото+озвучка)';
  render();
};

async function processScene(act, sc) {
  // ── Build character references: prefer charSheet views, fallback to stylized photo ──
  const charRefs = [];
  state.characters.filter(c => c.stylizedPhoto || c.stylizedUrl || c.charSheet?.length).forEach(c => {
    // If character has a sheet, use sheet views (better consistency)
    if (c.charSheet?.length) {
      c.charSheet.forEach(v => {
        if (v.url) charRefs.push({ url: v.url });
        else if (v.image) charRefs.push({ base64: v.image, mime: 'image/png' });
      });
    } else {
      // Fallback to single stylized photo
      if (c.stylizedUrl) charRefs.push({ url: c.stylizedUrl });
      else if (c.stylizedPhoto?.startsWith('data:')) charRefs.push({ base64: c.stylizedPhoto.split(',')[1], mime: c.stylizedPhoto.split(';')[0].split(':')[1] });
    }
  });

  // ── Build location reference for this act ──
  const loc = state.locations[act.id];
  let locationRef = null;
  if (loc?.url) {
    locationRef = { url: loc.url };
  }

  const refCount = charRefs.length + (locationRef ? 1 : 0);
  
  // ── IMAGES ──
  sc.status = 'generating_images';
  sc.error = null;
  render();
  addLog(`🎨 ${act.id}.${sc.index+1}: начальный кадр...${refCount ? ` (${charRefs.length} char + ${locationRef ? 1 : 0} loc refs)` : ''}`, 'accent');

  let imageSuccess = false;
  try {
    const r1 = await api('/api/generate-image', {
      prompt: sc.promptStart,
      negativePrompt: sc.negativePrompt,
      aspectRatio: state.aspectRatio,
      projectId: state.projectId || undefined,
      sceneId: sc.id,
      imageType: 'start',
      referenceImages: charRefs.length ? charRefs : undefined,
      locationImage: locationRef || undefined
    });
    sc.imageStartUrl = r1.url || ('data:image/png;base64,' + r1.image);

    // End frame: only generate for Veo (supports first+last frame interpolation)
    const needsEndFrame = state.videoProvider === 'veo' || state.videoProvider === 'auto';
    if (needsEndFrame && sc.promptEnd && sc.promptEnd !== sc.promptStart) {
      addLog(`⏳ Пауза 5 сек...`, '');
      await delay(5000);
      addLog(`🎨 ${act.id}.${sc.index+1}: конечный кадр (для Veo)...`, 'accent');
      const r2 = await api('/api/generate-image', {
        prompt: sc.promptEnd,
        negativePrompt: sc.negativePrompt,
        aspectRatio: state.aspectRatio,
        projectId: state.projectId || undefined,
        sceneId: sc.id,
        imageType: 'end',
        referenceImages: charRefs.length ? charRefs : undefined,
        locationImage: locationRef || undefined
      });
      sc.imageEndUrl = r2.url || ('data:image/png;base64,' + r2.image);
    } else {
      sc.imageEndUrl = null;
      addLog(`⏩ ${act.id}.${sc.index+1}: конечный кадр пропущен (${state.videoProvider})`, '');
    }
    
    addLog(`✅ ${act.id}.${sc.index+1}: кадры готовы`, 'green');
    imageSuccess = true;
  } catch (e) {
    addLog(`❌ Фото: ${e.message}`, 'red');
    sc.error = 'Ошибка фото: ' + e.message;
  }

  // ── VOICE [FIX #1] — always attempt if voiceScript exists ──
  if (sc.voiceScript) {
    sc.status = 'generating_audio';
    render();
    addLog(`🎙 ${act.id}.${sc.index+1}: озвучка...`, 'accent');
    try {
      const rv = await api('/api/generate-voice', {
        text: sc.voiceScript,
        projectId: state.projectId || undefined,
        sceneId: sc.id,
        language: state.language
      });
      const mime = rv.mime || 'audio/mpeg';
      sc.audioUrl = rv.url || (`data:${mime};base64,` + rv.audio);
      addLog(`✅ ${act.id}.${sc.index+1}: озвучка готова`, 'green');
    } catch (e) {
      addLog(`⚠️ Озвучка: ${e.message}`, 'red');
      // [FIX #2] Don't overwrite image error with voice error
      if (!sc.error) sc.error = 'Ошибка озвучки: ' + e.message;
    }
  }

  // [FIX #2] Only set done if images were successful
  sc.status = imageSuccess ? 'done' : 'error';
  fetchCosts(); // Update cost display
}

window.regenScene = async function(actId, sceneId) {
  const act = state.acts.find(a => a.id === actId);
  const sc = act.scenes.find(s => s.id === sceneId);
  await processScene(act, sc);
  render();
};

// ── VIDEO GENERATION [FIX #5] ──
window.genSceneVideo = async function(actId, sceneId) {
  const act = state.acts.find(a => a.id === actId);
  const sc = act.scenes.find(s => s.id === sceneId);
  if (!sc.imageStartUrl) return alert('Сначала сгенерируй кадры!');

  sc.videoStatus = 'processing';
  sc.videoProvider = state.videoProvider;
  render();
  addLog(`🎬 ${act.id}.${sc.index+1}: запуск видео (${state.videoProvider})...`, 'accent');

  try {
    // Determine image source — use URL if available from storage, else base64
    const isBase64 = sc.imageStartUrl.startsWith('data:');
    const payload = {
      provider: state.videoProvider,
      prompt: `${sc.promptStart}. Camera: ${sc.cameraMove}`,
      duration: sc.duration || 5,
      aspectRatio: state.aspectRatio,
      projectId: state.projectId || undefined,
      sceneId: sc.id
    };
    if (isBase64) {
      payload.imageBase64 = sc.imageStartUrl.split(',')[1];
    } else {
      payload.imageUrl = sc.imageStartUrl;
    }
    // Pass end frame for Veo first+last frame interpolation
    if (sc.imageEndUrl) {
      const isEndBase64 = sc.imageEndUrl.startsWith('data:');
      if (isEndBase64) {
        payload.imageEndBase64 = sc.imageEndUrl.split(',')[1];
      } else {
        payload.imageEndUrl = sc.imageEndUrl;
      }
    }

    const res = await api('/api/generate-video', payload);

    if (res.status === 'done' && (res.video || res.videoUrl)) {
      sc.videoUrl = res.videoUrl || ('data:video/mp4;base64,' + res.video);
      sc.videoStatus = 'done';
      addLog(`✅ ${act.id}.${sc.index+1}: видео готово`, 'green');
      saveProject().catch(e => addLog(`⚠️ Автосохранение: ${e.message}`, 'red'));
    } else if (res.taskId) {
      // Kling/Runway — need polling
      sc.videoTaskId = res.taskId;
      sc.videoProvider = res.provider;
      addLog(`⏳ ${act.id}.${sc.index+1}: видео в очереди (${res.provider})`, 'accent');
      pollVideoStatus(act, sc);
    }
  } catch (e) {
    sc.videoStatus = 'error';
    sc.error = 'Видео: ' + e.message;
    addLog(`❌ Видео: ${e.message}`, 'red');
  }
  render();
};

async function pollVideoStatus(act, sc) {
  const maxPolls = 60; // 5 min max
  let errors = 0;
  for (let i = 0; i < maxPolls; i++) {
    await delay(5000);
    try {
      const res = await api('/api/video-status', { taskId: sc.videoTaskId, provider: sc.videoProvider, projectId: state.projectId || undefined });
      errors = 0; // reset on success
      if (res.status === 'done') {
        if (res.videoUrl) {
          sc.videoUrl = res.videoUrl;
        } else if (res.video) {
          sc.videoUrl = 'data:video/mp4;base64,' + res.video;
        } else {
          // No video in response
          sc.videoStatus = 'error';
          sc.error = res.error || 'Видео не получено';
          addLog(`⚠️ ${act.id}.${sc.index+1}: ${sc.error}`, 'red');
          render();
          return;
        }
        sc.videoStatus = 'done';
        addLog(`✅ ${act.id}.${sc.index+1}: видео готово!`, 'green');
        render();
        // Auto-save to persist video URL in DB
        saveProject().catch(e => addLog(`⚠️ Автосохранение: ${e.message}`, 'red'));
        return;
      }
      if (res.progress) {
        addLog(`🎬 ${act.id}.${sc.index+1}: ${Math.round(res.progress * 100)}%`, '');
      }
    } catch (e) {
      errors++;
      addLog(`⚠️ Polling ${act.id}.${sc.index+1}: ${e.message} (попытка ${errors}/3)`, 'red');
      if (errors >= 3) {
        sc.videoStatus = 'error';
        sc.error = 'Видео polling: ' + e.message;
        addLog(`❌ ${act.id}.${sc.index+1}: остановлен после 3 ошибок`, 'red');
        render();
        return;
      }
      // Wait extra before retry
      await delay(5000);
    }
  }
  sc.videoStatus = 'error';
  sc.error = 'Таймаут генерации видео';
  addLog(`❌ Таймаут видео`, 'red');
  render();
}

window.goToExport = function() { state.step = 'export'; render(); };

// ── BATCH VIDEO GENERATION ──
window.batchVideoGenerate = async function() {
  const btn = $('btn-batch-video');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">◌</span> Видео...'; }
  genAbort = false;
  
  const allScenes = state.acts.flatMap(a => ({ act: a, scenes: a.scenes }));
  let started = 0;
  const pending = []; // parallel polling tasks
  
  for (const { act, scenes } of allScenes) {
    for (const sc of scenes) {
      if (genAbort) break;
      if (!sc.imageStartUrl || sc.videoUrl || sc.videoStatus === 'processing') continue;
      
      // Rate limit: wait between starts
      if (started > 0) {
        addLog('⏳ Пауза 3 сек...', '');
        await delay(3000);
      }
      
      addLog(`🎬 ${act.id}.${sc.index+1}: запуск видео batch...`, 'accent');
      sc.videoStatus = 'processing';
      sc.videoProvider = state.videoProvider;
      render();
      
      try {
        const isBase64 = sc.imageStartUrl.startsWith('data:');
        const payload = {
          provider: state.videoProvider,
          prompt: `${sc.promptStart}. Camera: ${sc.cameraMove}`,
          duration: sc.duration || 5,
          aspectRatio: state.aspectRatio,
          projectId: state.projectId || undefined,
          sceneId: sc.id
        };
        if (isBase64) payload.imageBase64 = sc.imageStartUrl.split(',')[1];
        else payload.imageUrl = sc.imageStartUrl;
        
        const res = await api('/api/generate-video', payload);
        
        if (res.status === 'done' && (res.video || res.videoUrl)) {
          sc.videoUrl = res.videoUrl || ('data:video/mp4;base64,' + res.video);
          sc.videoStatus = 'done';
          addLog(`✅ ${act.id}.${sc.index+1}: видео готово`, 'green');
        } else if (res.taskId) {
          sc.videoTaskId = res.taskId;
          sc.videoProvider = res.provider;
          addLog(`⏳ ${act.id}.${sc.index+1}: в очереди (${res.provider})`, 'accent');
          // Start polling in background
          pending.push(pollVideoStatus(act, sc));
        }
        started++;
      } catch (e) {
        sc.videoStatus = 'error';
        sc.error = 'Видео: ' + e.message;
        addLog(`❌ ${act.id}.${sc.index+1}: ${e.message}`, 'red');
      }
      render();
    }
  }
  
  // Wait for all polling tasks to finish
  if (pending.length) {
    addLog(`⏳ Ждём завершения ${pending.length} видео...`, 'accent');
    await Promise.allSettled(pending);
  }
  
  addLog('🎉 Batch видео завершён!', 'green');
  if (btn) { btn.disabled = false; btn.innerHTML = '🎬 Все видео'; }
  fetchCosts();
  saveProject().catch(e => addLog(`⚠️ Автосохранение: ${e.message}`, 'red'));
  render();
};

// ── MERGE SCENE (video + audio) ──
window.mergeScene = async function(actId, sceneId) {
  const act = state.acts.find(a => a.id === actId);
  const sc = act.scenes.find(s => s.id === sceneId);
  if (!sc.videoUrl) return;
  
  addLog(`⚡ ${act.id}.${sc.index+1}: склейка видео + звук...`, 'accent');
  try {
    const res = await api('/api/merge-scene', {
      videoUrl: sc.videoUrl,
      audioUrl: sc.audioUrl || null,
      projectId: state.projectId || undefined,
      sceneId: sc.id
    });
    sc.mergedUrl = res.url;
    addLog(`✅ ${act.id}.${sc.index+1}: склеено!`, 'green');
  } catch (e) {
    addLog(`❌ Склейка: ${e.message}`, 'red');
    // ffmpeg might not be available on Railway
    if (e.message.includes('ffmpeg') || e.message.includes('ENOENT')) {
      addLog('⚠️ ffmpeg не установлен на сервере. Добавь в Dockerfile: RUN apt-get install -y ffmpeg', 'red');
    }
  }
  render();
};

// ── MERGE ALL SCENES into final video ──
window.mergeAllScenes = async function() {
  const btn = $('btn-merge-all');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">◌</span> Склейка...'; }
  
  // First merge each scene (video+audio) if not yet done
  const allScenes = state.acts.flatMap(a => a.scenes).filter(s => s.videoUrl);
  for (const sc of allScenes) {
    if (!sc.mergedUrl && sc.audioUrl) {
      const act = state.acts.find(a => a.scenes.includes(sc));
      addLog(`⚡ Склейка сцены ${act.id}.${sc.index+1}...`, 'accent');
      try {
        const res = await api('/api/merge-scene', {
          videoUrl: sc.videoUrl, audioUrl: sc.audioUrl,
          projectId: state.projectId || undefined, sceneId: sc.id
        });
        sc.mergedUrl = res.url;
      } catch (e) { addLog(`⚠️ ${e.message}`, 'red'); }
    }
  }
  render();
  
  // Now concatenate all clips
  addLog('⚡ Финальная склейка всех клипов...', 'accent');
  try {
    const scenes = allScenes.map(s => ({
      videoUrl: s.videoUrl,
      mergedUrl: s.mergedUrl || null
    }));
    const res = await api('/api/merge-all', { scenes, projectId: state.projectId || undefined });
    state.finalVideoUrl = res.url;
    addLog(`✅ Финальное видео готово! (${res.clipCount} клипов)`, 'green');
  } catch (e) {
    addLog(`❌ Финальная склейка: ${e.message}`, 'red');
  }
  
  if (btn) { btn.disabled = false; btn.innerHTML = '⚡ Склейка'; }
  render();
};

      ${sc.imageStartUrl ? `<button class="btn-ghost" style="font-size:11px;padding:4px 8px" onclick="dl('${sc.imageStartUrl}','s${i+1}_start.png')">▷ start</button>` : ''}
      ${sc.imageEndUrl ? `<button class="btn-ghost" style="font-size:11px;padding:4px 8px" onclick="dl('${sc.imageEndUrl}','s${i+1}_end.png')">▷ end</button>` : ''}
      ${sc.mergedUrl ? `<button class="btn-accent2" style="font-size:11px;padding:4px 8px" onclick="dl('${sc.mergedUrl}','s${i+1}_merged.mp4')">▷ merged</button>` : sc.videoUrl ? `<button class="btn-accent2" style="font-size:11px;padding:4px 8px" onclick="dl('${sc.videoUrl}','s${i+1}_video.mp4')">▷ video</button>` : ''}
    </div>
  </div>`).join('');

  wrap.innerHTML = `
    <div style="margin-bottom:16px"><button class="btn-back" onclick="state.step='generate';render()">← Генерация</button></div>
    <div class="section-head"><div class="section-tag">// ЭТАП 04</div><h1 class="section-title">Экспорт</h1><p class="section-sub">${done.length} сцен · ${withVideo.length} видео · ${withMerged.length} склеено</p></div>
    ${state.finalVideoUrl ? `<div class="card" style="border-color:rgba(71,194,255,0.3);background:rgba(71,194,255,0.05);margin-bottom:24px">
      <div class="card-label" style="color:var(--accent2)">🎬 ФИНАЛЬНОЕ ВИДЕО</div>
      <video src="${state.finalVideoUrl}" controls style="width:100%;max-height:400px;border-radius:12px;margin:12px 0"></video>
      <button class="btn-primary" style="width:100%;justify-content:center" onclick="dl('${state.finalVideoUrl}','final_video.mp4')">↓ Скачать финальное видео</button>
    </div>` : ''}
    <div class="export-grid">
      <div class="export-card"><div class="export-card-icon">🖼</div><div class="export-card-title">Кадры</div><div class="export-card-sub">${done.length * 2} изображений</div>
        <button class="btn-primary" style="margin-top:16px;width:100%;justify-content:center" onclick="dlAll('images')">↓ Скачать фото</button></div>
      <div class="export-card"><div class="export-card-icon">🎙</div><div class="export-card-title">Озвучка</div><div class="export-card-sub">${done.filter(s=>s.audioUrl).length} аудио</div>
        <button class="btn-primary" style="margin-top:16px;width:100%;justify-content:center" onclick="dlAll('audio')">↓ Скачать аудио</button></div>
      <div class="export-card"><div class="export-card-icon">🎬</div><div class="export-card-title">Видео</div><div class="export-card-sub">${withVideo.length} клипов</div>
        <button class="btn-primary" style="margin-top:16px;width:100%;justify-content:center" onclick="dlAll('video')" ${withVideo.length===0?'disabled':''}>↓ Скачать MP4</button></div>
    </div>
    <div class="card"><div class="card-label" style="margin-bottom:16px">Сцены по одной</div>${scenesHtml}</div>
    ${!state.finalVideoUrl && withVideo.length >= 2 ? `<div class="card" style="border-color:rgba(71,194,255,0.2);background:rgba(71,194,255,0.03)">
      <div class="card-label" style="color:var(--accent2)">Автоматическая склейка</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Объединить все видео + озвучку в одно финальное видео на сервере (ffmpeg)</div>
      <button class="btn-accent2" onclick="mergeAllScenes()">⚡ Склеить ${withVideo.length} клипов в финал</button>
    </div>` : ''}
    <div style="margin-top:24px;display:flex;gap:12px"><button class="btn-ghost" onclick="saveProject()">💾 Сохранить проект</button></div>`;
  return wrap;
}

window.dl = function(url, name) { const a = document.createElement('a'); a.href = url; a.download = name; a.click(); };
window.dlAll = function(type) {
  const done = state.acts.flatMap(a => a.scenes).filter(s => s.status === 'done');
  done.forEach((s, i) => {
    if (type === 'images') { if (s.imageStartUrl) dl(s.imageStartUrl, `scene_${i+1}_start.png`); if (s.imageEndUrl) dl(s.imageEndUrl, `scene_${i+1}_end.png`); }
    if (type === 'audio' && s.audioUrl) dl(s.audioUrl, `scene_${i+1}_audio.mp3`);
    if (type === 'video' && s.videoUrl) dl(s.videoUrl, `scene_${i+1}_video.mp4`);
  });
};

// ── LOG ──
function renderLog() {
  const el = $('scenes-log') || $('gen-log');
  if (!el) return;
  el.innerHTML = state.log.length ? `<div class="log-panel">${state.log.map(l => `<div class="log-line ${l.type}">${l.t} — ${l.msg}</div>`).join('')}</div>` : '';
  if (el.querySelector('.log-panel')) el.querySelector('.log-panel').scrollTop = 99999;
}

// ── INIT ──
render();
loadProjects().catch(() => {});
loadVideoProviders().catch(() => {});
fetchCosts().catch(() => {});
setInterval(() => fetchCosts().catch(() => {}), 15000);
</script>
</body>
</html>
